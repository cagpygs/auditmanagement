version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
      - app4
    restart: always

  app1:
    build: .
    environment:
      - DB_HOST=${DB_HOST:-localhost}
      - DB_NAME=${DB_NAME:-Irrigation}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT:-5432}
      - DB_POOL_MINCONN=2
      - DB_POOL_MAXCONN=55
    volumes:
      - ./uploads:/app/uploads
    restart: always
    expose:
      - "8501"

  app2:
    build: .
    environment:
      - DB_HOST=${DB_HOST:-localhost}
      - DB_NAME=${DB_NAME:-Irrigation}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT:-5432}
      - DB_POOL_MINCONN=2
      - DB_POOL_MAXCONN=55
    volumes:
      - ./uploads:/app/uploads
    restart: always
    expose:
      - "8501"

  app3:
    build: .
    environment:
      - DB_HOST=${DB_HOST:-localhost}
      - DB_NAME=${DB_NAME:-Irrigation}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT:-5432}
      - DB_POOL_MINCONN=2
      - DB_POOL_MAXCONN=55
    volumes:
      - ./uploads:/app/uploads
    restart: always
    expose:
      - "8501"

  app4:
    build: .
    environment:
      - DB_HOST=${DB_HOST:-localhost}
      - DB_NAME=${DB_NAME:-Irrigation}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT:-5432}
      - DB_POOL_MINCONN=2
      - DB_POOL_MAXCONN=55
    volumes:
      - ./uploads:/app/uploads
    restart: always
    expose:
      - "8501"
